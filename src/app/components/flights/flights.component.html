<div class="card-container">
  <mat-card *ngFor="let flight of dataSource2" class="flight-card mat-elevation-z4">
    <mat-card-header>
      <mat-card-title>✈️ Flug von {{ flight.origin }} nach {{ flight.destination }}</mat-card-title>
      <mat-card-subtitle>Abflug: {{ flight.departureDate }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>Preis: {{ flight.price | currency:'EUR' }}</p>
      <p>Direktflug: {{ flight.direct ? 'Ja' : 'Nein' }}</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button color="primary">Details</button>
      <button mat-button color="accent">Buchen</button>
    </mat-card-actions>
  </mat-card>
</div>
